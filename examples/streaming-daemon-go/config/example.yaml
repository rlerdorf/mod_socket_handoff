# Example configuration for streaming-daemon
# Copy to local.yaml and customize (local.yaml is gitignored)

server:
  socket_path: /run/streaming-daemon.sock
  socket_mode: 0660
  max_connections: 50000
  max_stream_duration_ms: 300000  # Max per-stream duration in ms (0 = no timeout, default: 300000 = 5 min)
  # pprof_addr: localhost:6060  # Uncomment to enable profiling
  # mem_limit: 768MiB            # Soft memory limit (e.g. 512MiB, 1GiB); empty = no limit
  # gc_percent: 100             # GOGC value; 0 = not set (use -gc-percent=0 flag to disable GC)
  # data_dir: /run/handoff-data  # Directory for attachment files (images, text, etc.)

backend:
  # Available providers: langgraph, mock, openai, typing
  provider: openai
  default_model: gpt-4o-mini

  # OpenAI-compatible API configuration
  openai:
    # SECURITY: Never store API keys in config files for production.
    # Use OPENAI_API_KEY environment variable instead (recommended).
    # api_key: sk-...
    api_base: https://api.openai.com/v1
    # api_socket: /run/openai-proxy.sock  # Unix socket for high concurrency
    http2_enabled: true
    insecure_ssl: false

  # LangGraph Platform API configuration
  langgraph:
    # SECURITY: Never store API keys in config files for production.
    # Use LANGGRAPH_API_KEY environment variable instead (recommended).
    # api_key: lgk_...
    api_base: https://api.langchain.com/v1
    # api_socket: /run/langgraph-proxy.sock  # Unix socket for high concurrency
    assistant_id: agent
    stream_mode: messages-tuple
    http2_enabled: true
    insecure_ssl: false

    # Named profiles for routing to different LangGraph deployments.
    # Each profile inherits unset fields from the top-level langgraph config.
    # Select a profile per-request via {"profile": "name"} in X-Handoff-Data.
    # profiles:
    #   sales:
    #     # SECURITY: Prefer environment variables or a secrets manager over storing keys here.
    #     api_key: lgk_sales_key
    #     api_base: https://sales-api.example.com/v1
    #     assistant_id: sales-agent
    #   claude-agent:
    #     # SECURITY: Prefer environment variables or a secrets manager over storing keys here.
    #     api_key: lgk_claude_key
    #     assistant_id: claude-agent
    #     content_format: anthropic  # Anthropic document blocks for PDFs (default: openai)
    #   support:
    #     # SECURITY: Prefer environment variables or a secrets manager over storing keys here.
    #     api_key: lgk_support_key
    #     assistant_id: support-agent

  # Mock backend configuration
  mock:
    message_delay_ms: 50

  # Typing backend configuration
  typing: {}

metrics:
  enabled: true
  listen_addr: 127.0.0.1:9090

logging:
  level: info    # debug, info, warn, error
  format: text   # text, json
